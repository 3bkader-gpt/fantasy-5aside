{% extends "base.html" %}

{% block content %}
<div class="container-sm" style="max-width: 520px; margin-top: 5rem; text-align: right;">
  <h1 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-color);">إعادة تعيين كلمة السر</h1>
  <p class="text-secondary" style="font-size: 1rem;">
    اختر كلمة سر جديدة لحسابك.
  </p>

  {% if error %}
  <div class="alert alert-danger mb-2" style="padding: 1rem; border-radius: 8px;">
    {{ error }}
  </div>
  {% endif %}

  <div class="card mb-3" style="border-top: 5px solid var(--primary-color); padding: 1.5rem;">
    <form action="/reset-password/{{ token }}" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="mb-2">
        <label class="form-label" style="font-weight: bold;">كلمة السر الجديدة:</label>
        <input type="password" name="new_password" required
               class="form-control" style="padding: 0.8rem; font-size: 1rem;">
        <small class="text-muted">٨ أحرف على الأقل مع حروف كبيرة وصغيرة ورقم.</small>
      </div>

      <div class="mb-2">
        <label class="form-label" style="font-weight: bold;">تأكيد كلمة السر:</label>
        <input type="password" name="confirm_password" required
               class="form-control" style="padding: 0.8rem; font-size: 1rem;">
      </div>

      <button type="submit" class="btn btn-primary"
              style="width: 100%; padding: 0.9rem; font-size: 1.1rem; margin-top: 1rem;">
        حفظ كلمة السر
      </button>
    </form>
  </div>

  <div class="mt-2">
    <a href="/login" style="color: var(--text-muted); text-decoration: none; font-size: 0.95rem;">
      العودة لتسجيل الدخول
    </a>
  </div>
</div>
{% endblock %}
