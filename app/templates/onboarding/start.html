{% extends "base.html" %}

{% block content %}
<div class="container" style="margin-top: 3rem; max-width: 760px;">
  <div class="card" style="padding: 1.5rem;">
    <h1 class="mb-2" style="text-align: right; color: var(--text-color);">الإعداد السريع</h1>
    <p class="text-muted mb-3" style="text-align: right;">
      هتجهّز أول دوري ليك في 3 خطوات بسيطة: إنشاء الدوري → أسماء الفرق → إضافة اللاعبين.
    </p>

    <div class="card mb-3" style="padding: 1rem; background: var(--surface-color);">
      <div class="text-muted" style="text-align: right; font-size: .95rem; line-height: 1.8;">
        <div><strong>1)</strong> اسم الدوري والرابط + PIN للأدمن.</div>
        <div><strong>2)</strong> أسماء الفريقين (اختياري).</div>
        <div><strong>3)</strong> إضافة اللاعبين دفعة واحدة.</div>
      </div>
    </div>

    <form method="get" action="/onboarding/league" class="m-0">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="d-flex" style="gap: .5rem; justify-content: flex-end; flex-wrap: wrap;">
        <a href="/dashboard" class="btn btn-outline-secondary">رجوع للوحة الحساب</a>
        <button type="submit" class="btn btn-primary">ابدأ الآن</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
