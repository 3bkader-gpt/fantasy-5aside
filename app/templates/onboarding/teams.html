{% extends "base.html" %}

{% block content %}
<div class="page-shell narrow wizard">
  <div class="card" style="padding: 1.5rem;">
    <div class="wizard-steps">
      <div class="wizard-step"><span class="num">1</span><span>الدوري</span></div>
      <div class="wizard-step active"><span class="num">2</span><span>الفرق</span></div>
      <div class="wizard-step"><span class="num">3</span><span>اللاعبين</span></div>
    </div>

    <div class="page-header" style="margin-bottom: .75rem;">
      <div>
        <h1 class="page-title" style="font-size: 1.85rem;">أسماء الفرق</h1>
        <p class="page-subtitle">خطوة اختيارية—هتظهر في صفحات المباريات والإدارة.</p>
      </div>
      <a href="/onboarding/league" class="btn btn-outline-secondary">رجوع</a>
    </div>

    {% if error %}
    <div class="alert alert-danger" style="text-align: right;">{{ error }}</div>
    {% endif %}

    <div class="empty-state mb-3">
      <div style="color: var(--text-color); font-weight: 800;">{{ league.name }}</div>
      <div class="text-muted" style="font-size: .9rem;">/l/{{ league.slug }}</div>
    </div>

    <form method="post" action="/onboarding/teams" class="m-0">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="league_id" value="{{ league.id }}">

      <div class="mb-3">
        <label class="form-label" style="display:block;">اسم الفريق A</label>
        <input name="team_a_label" class="form-control" value="{{ league.team_a_label or 'فريق أ' }}" placeholder="مثال: الأحمر">
      </div>

      <div class="mb-3">
        <label class="form-label" style="display:block;">اسم الفريق B</label>
        <input name="team_b_label" class="form-control" value="{{ league.team_b_label or 'فريق ب' }}" placeholder="مثال: الأزرق">
      </div>

      <div class="wizard-actions sticky">
        <a href="/dashboard" class="btn btn-outline-secondary">إلغاء</a>
        <button type="submit" class="btn btn-primary">التالي</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
